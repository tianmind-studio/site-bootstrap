name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: -x -e SC1091
        with:
          scandir: "./bin ./lib"
          additional_files: "install.sh"

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats
      - name: Install runtime deps used by the CLI
        run: |
          sudo apt-get install -y jq rsync
      - name: Run smoke tests
        run: bats tests/
